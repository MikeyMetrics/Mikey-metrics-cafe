<!DOCTYPE html>
<html>
<head>
    <title>Hidden Cafe - Smart Menu</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body style="background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center;">

    <h1>Welcome to The Hidden Cafe</h1>
    <p>Mikey Metrics Smart Ordering System</p>

    <div id="menu-items" style="margin-top: 50px;">
        <div style="border: 1px solid #444; padding: 20px; border-radius: 10px; margin: 10px;">
            <h3>Special Cold Coffee</h3>
            <p>Price: ₹120</p>
            <p>Stock: <span id="stock-count">Loading...</span></p>
            <button onclick="orderItem()" style="padding: 10px 20px; background: #f39c12; border: none; border-radius: 5px; cursor: pointer;">Order Now</button>
        </div>
    </div>

    <script>
        // Aapka Firebase Config jo aapne copy kiya tha
        const firebaseConfig = {
            apiKey: "AIzaSyCmX32ch9c2KZrBtXtwVVwE7rhpz9Z-TjI",
            authDomain: "mikey-metrics-pos.firebaseapp.com",
            projectId: "mikey-metrics-pos",
            databaseURL: "https://mikey-metrics-pos-default-rtdb.firebaseio.com", // Verify this in Firebase
            storageBucket: "mikey-metrics-pos.firebasestorage.app",
            messagingSenderId: "74895184876",
            appId: "1:74895184876:web:1d71c3c45abcb7246ba6c9"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Stock Update Hone par Refresh
        database.ref('stock/coffee').on('value', (snapshot) => {
            const val = snapshot.val();
            document.getElementById('stock-count').innerText = val;
        });

        // Order Button Function
        function orderItem() {
            database.ref('stock/coffee').transaction((currentStock) => {
                if (currentStock > 0) {
                    alert("Order Placed! KOT sent to Kitchen.");
                    return currentStock - 1;
                } else {
                    alert("Out of Stock!");
                    return currentStock;
                }
            });
        }
    </script>
</body>
</html>
